<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Room Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99;
      gap: 14px;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(99, 102, 241, 0.18);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #load-text {
      color: rgba(255, 255, 255, 0.65);
      font: 14px sans-serif;
      text-align: center;
    }

    #load-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    #load-bar {
      height: 100%;
      width: 0%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.25s;
    }

    #controls {
      position: fixed;
      bottom: 14px;
      left: 14px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: rgba(255, 255, 255, 0.5);
      font: 11px/1.8 sans-serif;
      pointer-events: none;
    }

    #controls b {
      color: rgba(255, 255, 255, 0.75);
    }

    #select-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 7px 14px 7px 10px;
      color: rgba(255, 255, 255, 0.65);
      font: 12px/1 sans-serif;
      font-weight: 500;
      cursor: pointer;
      z-index: 9999;
      pointer-events: all;
      isolation: isolate;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    #select-toggle:hover {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.5);
      color: rgba(255, 255, 255, 0.9);
    }

    #select-toggle.active {
      background: rgba(99, 102, 241, 0.35);
      border-color: rgba(99, 102, 241, 0.8);
      color: #fff;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.45);
    }

    #select-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #select-toggle.active .dot {
      background: #a5b4fc;
      box-shadow: 0 0 6px #6366f1;
    }

    #size-panel {
      position: fixed;
      bottom: -220px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      background: rgba(10, 12, 30, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 16px;
      padding: 0;
      z-index: 9999;
      pointer-events: all;
      isolation: isolate;
      transition: bottom 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
      box-shadow: 0 -4px 40px rgba(99, 102, 241, 0.2), 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    #size-panel.visible {
      bottom: 20px;
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    #panel-furniture-name {
      font: 600 13px/1 sans-serif;
      color: #a5b4fc;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    #panel-furniture-name::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 6px #6366f1;
    }

    #panel-close {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }

    #panel-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    #panel-body {
      padding: 14px 16px 16px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .slider-label {
      font: 11px/1 sans-serif;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      width: 38px;
    }

    #scale-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #6366f1 var(--pct, 30%), rgba(255, 255, 255, 0.12) var(--pct, 30%));
      outline: none;
      cursor: pointer;
    }

    #scale-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25), 0 2px 6px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
    }

    #scale-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.35), 0 2px 8px rgba(0, 0, 0, 0.5);
      transform: scale(1.1);
    }

    #scale-value-badge {
      font: 600 12px/1 'Courier New', monospace;
      color: #c7d2fe;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 6px;
      padding: 4px 8px;
      min-width: 46px;
      text-align: center;
    }

    .scale-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .preset-btn {
      flex: 1 1 auto;
      min-width: 36px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.55);
      font: 11px/1 sans-serif;
      padding: 6px 3px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-align: center;
      white-space: nowrap;
    }

    .preset-btn:hover,
    .preset-btn.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
      color: #a5b4fc;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    #btn-reset {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.55);
      font: 12px/1 sans-serif;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #btn-reset:hover {
      background: rgba(255, 255, 255, 0.10);
      color: #fff;
    }

    #btn-save {
      flex: 2;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      color: #fff;
      font: 13px/1 sans-serif;
      font-weight: 700;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    #btn-save:hover {
      background: #4f52d4;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.5);
    }

    #btn-save:active {
      transform: scale(0.97);
    }

    #btn-save.saved {
      background: #16a34a;
      box-shadow: 0 4px 14px rgba(22, 163, 74, 0.4);
    }

    body.select-active canvas {
      cursor: crosshair !important;
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-text">Starting…</div>
    <div id="load-bar-wrap">
      <div id="load-bar"></div>
    </div>
  </div>

  <div id="controls">
    <b>Mouse</b><br>
    Left-drag → Orbit &nbsp;·&nbsp; Scroll → Zoom &nbsp;·&nbsp; Right-drag → Pan<br>
    <b>Select Mode</b><br>
    Left-click → Select furniture &nbsp;·&nbsp; Right-drag → Pan<br>
    <b>Keyboard</b><br>
    W/S → Zoom &nbsp;·&nbsp; A/D → Rotate &nbsp;·&nbsp; Arrows → Pan
  </div>

  <div id="select-toggle">
    <span class="dot"></span>
    <span id="select-toggle-label">Select &amp; Resize</span>
  </div>

  <div id="size-panel">
    <div id="panel-header">
      <div id="panel-furniture-name">Chair</div>
      <div id="panel-close">×</div>
    </div>
    <div id="panel-body">
      <div class="slider-row">
        <span class="slider-label">Scale</span>
        <!-- Slider internal value is logarithmic: sliderVal = ln(scaleFactor).
             Range: ln(0.01)≈-4.605  →  ln(20)≈2.996  -->
        <input type="range" id="scale-slider" min="-4.605" max="2.996" step="0.01" value="0">
        <span id="scale-value-badge">1.00×</span>
      </div>
      <div class="scale-presets">
        <div class="preset-btn" data-preset="0.1">0.1×</div>
        <div class="preset-btn" data-preset="0.5">½×</div>
        <div class="preset-btn active" data-preset="1.0">1×</div>
        <div class="preset-btn" data-preset="3.0">3×</div>
        <div class="preset-btn" data-preset="5.0">5×</div>
        <div class="preset-btn" data-preset="10.0">10×</div>
        <div class="preset-btn" data-preset="20.0">20×</div>
      </div>
      <div class="panel-actions">
        <button id="btn-reset">↺ Reset</button>
        <button id="btn-save">💾 Save Size</button>
      </div>
    </div>
  </div>

  <script>
    var bank = {};

    // ── Module-level refs exposed from boot() ──────────────────────────────
    var _scene = null;
    var _controls = null;   // ← OrbitControls reference (NEW)

    var placedItems = [];
    var selectedEntry = null;
    var selectionBox = null;
    var mouseDownX = 0, mouseDownY = 0;
    var selectMode = false;

    function setStatus(t, p) {
      var el = document.getElementById('load-text');
      if (el) el.textContent = t;
      if (p !== undefined) { var b = document.getElementById('load-bar'); if (b) b.style.width = p + '%'; }
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('hidden'); setTimeout(function () { el.style.display = 'none'; }, 600); }
    }

    function getPayload() {
      try {
        var raw = new URLSearchParams(window.location.search).get('d');
        if (!raw) return null;
        return JSON.parse(atob(raw.replace(/-/g, '+').replace(/_/g, '/')));
      } catch (e) { return null; }
    }

    function loadScript(src, cb) {
      var s = document.createElement('script');
      s.src = src + '?t=' + Date.now();
      s.onload = cb;
      s.onerror = function () { console.error('Script failed: ' + src); cb(); };
      document.head.appendChild(s);
    }

    setStatus('Loading Three.js…', 5);
    loadScript('three.min.js', function () {
      setStatus('Loading controls…', 20);
      loadScript('OrbitControls.js', function () {
        setStatus('Loading GLTF loader…', 35);
        loadScript('GLTFLoader.js', function () { setTimeout(boot, 60); });
      });
    });

    function boot() {
      if (typeof THREE === 'undefined') { setStatus('Error: Three.js failed'); return; }

      // ── Renderer ────────────────────────────────────────────────────────
      var renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.NoToneMapping;
      // No tone mapping exposure needed when tone mapping is off
      document.body.appendChild(renderer.domElement);

      // ── Scene / Camera ───────────────────────────────────────────────────
      var scene = new THREE.Scene();
      _scene = scene;
      scene.background = new THREE.Color(0x1a1a2e);
      var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(12, 8, 14);

      // ── OrbitControls ────────────────────────────────────────────────────
      var controls = new THREE.OrbitControls(camera, renderer.domElement);
      _controls = controls;   // ← expose to module scope so toggleSelectMode() can reach it
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.minDistance = 1;
      controls.maxDistance = 40;
      controls.maxPolarAngle = Math.PI * 0.88;
      controls.zoomSpeed = 1.2;
      controls.rotateSpeed = 0.8;
      controls.panSpeed = 0.8;
      controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
      controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
      controls.update();

      // ── Flutter touchpad bridge ──────────────────────────────────────────
      var _tpStartDist = 0, _tpFocalX = 0, _tpFocalY = 0;
      window._flutterTouchpad = function (type, x, y, scale, panDx, panDy) {
        if (type === 'start') { _tpStartDist = camera.position.distanceTo(controls.target); _tpFocalX = x; _tpFocalY = y; return; }
        if (type === 'end') { _tpStartDist = 0; return; }
        var dist = camera.position.distanceTo(controls.target);
        var isPinch = Math.abs(scale - 1.0) > 0.03;
        if (!isPinch && (panDx !== 0 || panDy !== 0)) {
          var ps = dist * 0.004;
          var right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
          var up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
          var delta = new THREE.Vector3().addScaledVector(right, -panDx * ps).addScaledVector(up, panDy * ps);
          camera.position.add(delta); controls.target.add(delta);
        }
        if (isPinch && _tpStartDist > 0) {
          var newDist = Math.max(controls.minDistance, Math.min(controls.maxDistance, _tpStartDist / scale));
          var dir = camera.position.clone().sub(controls.target).normalize();
          camera.position.copy(controls.target).addScaledVector(dir, newDist);
        }
        controls.update();
      };

      // ── Scroll zoom (custom — OrbitControls zoom disabled) ───────────────
      controls.enableZoom = false;
      renderer.domElement.addEventListener('wheel', function (e) {
        e.preventDefault();
        var norm;
        if (e.deltaMode === 1) norm = e.deltaY * 0.025;
        else if (e.deltaMode === 2) norm = e.deltaY * 0.07;
        else norm = e.deltaY * 0.0008;
        norm = Math.max(-0.08, Math.min(0.08, norm));
        var dist = camera.position.distanceTo(controls.target);
        var newD = Math.max(controls.minDistance, Math.min(controls.maxDistance, dist * (1.0 + norm)));
        var dir = camera.position.clone().sub(controls.target).normalize();
        camera.position.copy(controls.target).addScaledVector(dir, newD);
        controls.update();
      }, { passive: false });

      // ── Keyboard controls ────────────────────────────────────────────────
      var keys = {};
      window.addEventListener('keydown', function (e) { keys[e.key] = true; });
      window.addEventListener('keyup', function (e) { keys[e.key] = false; });
      function handleKeys() {
        var any = false; for (var k in keys) { if (keys[k]) { any = true; break; } } if (!any) return;
        var dist = camera.position.distanceTo(controls.target);
        var zS = dist * 0.025, pS = dist * 0.015, rS = 0.03;
        if (keys['w'] || keys['W']) { var d = camera.position.clone().sub(controls.target).normalize(); camera.position.copy(controls.target).addScaledVector(d, Math.max(controls.minDistance, dist - zS)); }
        if (keys['s'] || keys['S']) { var d2 = camera.position.clone().sub(controls.target).normalize(); camera.position.copy(controls.target).addScaledVector(d2, Math.min(controls.maxDistance, dist + zS)); }
        if (keys['a'] || keys['A']) { var o = camera.position.clone().sub(controls.target); var c = Math.cos(rS), s = Math.sin(rS); camera.position.set(controls.target.x + o.x * c - o.z * s, camera.position.y, controls.target.z + o.x * s + o.z * c); }
        if (keys['d'] || keys['D']) { var o2 = camera.position.clone().sub(controls.target); var c2 = Math.cos(-rS), s2 = Math.sin(-rS); camera.position.set(controls.target.x + o2.x * c2 - o2.z * s2, camera.position.y, controls.target.z + o2.x * s2 + o2.z * c2); }
        if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown']) {
          var right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0), up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
          if (keys['ArrowLeft']) { camera.position.addScaledVector(right, -pS); controls.target.addScaledVector(right, -pS); }
          if (keys['ArrowRight']) { camera.position.addScaledVector(right, pS); controls.target.addScaledVector(right, pS); }
          if (keys['ArrowUp']) { camera.position.addScaledVector(up, pS); controls.target.addScaledVector(up, pS); }
          if (keys['ArrowDown']) { camera.position.addScaledVector(up, -pS); controls.target.addScaledVector(up, -pS); }
        }
        controls.update();
      }

      // ── Lights ───────────────────────────────────────────────────────────
      scene.add(new THREE.AmbientLight(0xfff5e8, 0.55));
      scene.add(new THREE.HemisphereLight(0xfff0d0, 0x6a5a40, 0.4));
      var sun = new THREE.DirectionalLight(0xfff8f0, 1.2);
      sun.position.set(8, 14, 6); sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048); sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
      sun.shadow.camera.left = sun.shadow.camera.bottom = -20; sun.shadow.camera.right = sun.shadow.camera.top = 20; sun.shadow.bias = -0.001;
      scene.add(sun);
      var fill = new THREE.DirectionalLight(0xc8d8ff, 0.3); fill.position.set(-6, 8, -6); scene.add(fill);

      // ── Room builder ─────────────────────────────────────────────────────
      // sRGB → Linear: converts a hex string chosen by the user (sRGB space)
      // into a THREE.Color in linear space. With sRGBEncoding the renderer
      // applies linear→sRGB, so the display shows exactly the original hex.
      function srgbHexToLinear(hex) {
        var h = parseInt(hex, 16);
        var r = (h >> 16 & 0xFF) / 255;
        var g = (h >> 8 & 0xFF) / 255;
        var b = (h & 0xFF) / 255;
        function toLinear(c) {
          return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        }
        return new THREE.Color(toLinear(r), toLinear(g), toLinear(b));
      }
      var roomGroup = new THREE.Group(); scene.add(roomGroup);
      function buildRoom(rw, rd) {
        while (roomGroup.children.length) roomGroup.remove(roomGroup.children[0]);
        var WH = 3.2;
        var _p = getPayload() || {};
        // Use exact user-chosen colors: sRGB hex → linear → renderer applies sRGB encoding → exact color on screen
        var floorColor = _p.floorColor ? srgbHexToLinear(_p.floorColor) : new THREE.Color(0xd4c4a8).convertSRGBToLinear();
        var wallColor = _p.wallColor ? srgbHexToLinear(_p.wallColor) : new THREE.Color(0xf0ebe2).convertSRGBToLinear();
        var ceilColor = _p.ceilingColor ? srgbHexToLinear(_p.ceilingColor) : new THREE.Color(0xfaf8f4).convertSRGBToLinear();
        var trimColor = _p.trimColor ? srgbHexToLinear(_p.trimColor) : new THREE.Color(0xe8e0d4).convertSRGBToLinear();
        // MeshBasicMaterial ignores scene lighting — colour is rendered exactly
        var floorMat = new THREE.MeshBasicMaterial({ color: floorColor });
        var wallMat = new THREE.MeshBasicMaterial({ color: wallColor });
        var ceilMat = new THREE.MeshBasicMaterial({ color: ceilColor });
        var trimMat = new THREE.MeshBasicMaterial({ color: trimColor });
        var floor = new THREE.Mesh(new THREE.PlaneGeometry(rw, rd), floorMat);
        floor.rotation.x = -Math.PI / 2; floor.position.set(rw / 2, 0, rd / 2); floor.receiveShadow = true; roomGroup.add(floor);
        var gridDiv = Math.round(Math.max(rw, rd) * 2);
        var floorHex = _p.floorColor ? parseInt(_p.floorColor, 16) : 0xd4c4a8;
        var floorR = (floorHex >> 16 & 0xFF) / 255;
        var floorBrightness = floorR * 0.3 + ((floorHex >> 8 & 0xFF) / 255) * 0.59 + ((floorHex & 0xFF) / 255) * 0.11;
        var gridDark = floorBrightness > 0.5 ? 0x808080 : 0xffffff;
        var gridLight = floorBrightness > 0.5 ? 0xa0a0a0 : 0xffffff;
        var grid = new THREE.GridHelper(Math.max(rw, rd), gridDiv, gridDark, gridLight);
        grid.position.set(rw / 2, 0.002, rd / 2); grid.scale.set(rw / Math.max(rw, rd), 1, rd / Math.max(rw, rd));
        grid.material.opacity = 0.25; grid.material.transparent = true;
        roomGroup.add(grid);
        function addWall(geo, pos, rotY) { var m = new THREE.Mesh(geo, wallMat.clone()); m.position.copy(pos); if (rotY) m.rotation.y = rotY; m.receiveShadow = true; roomGroup.add(m); }
        addWall(new THREE.PlaneGeometry(rw, WH), new THREE.Vector3(rw / 2, WH / 2, 0), 0);
        addWall(new THREE.PlaneGeometry(rw, WH), new THREE.Vector3(rw / 2, WH / 2, rd), Math.PI);
        addWall(new THREE.PlaneGeometry(rd, WH), new THREE.Vector3(0, WH / 2, rd / 2), Math.PI / 2);
        addWall(new THREE.PlaneGeometry(rd, WH), new THREE.Vector3(rw, WH / 2, rd / 2), -Math.PI / 2);
        var ceil = new THREE.Mesh(new THREE.PlaneGeometry(rw, rd), ceilMat); ceil.rotation.x = Math.PI / 2; ceil.position.set(rw / 2, WH, rd / 2); roomGroup.add(ceil);
        var bh = 0.08, bd = 0.02;
        function addBoard(geo, pos) { var m = new THREE.Mesh(geo, trimMat.clone()); m.position.copy(pos); roomGroup.add(m); }
        addBoard(new THREE.BoxGeometry(rw, bh, bd), new THREE.Vector3(rw / 2, bh / 2, bd / 2));
        addBoard(new THREE.BoxGeometry(rw, bh, bd), new THREE.Vector3(rw / 2, bh / 2, rd - bd / 2));
        addBoard(new THREE.BoxGeometry(bd, bh, rd), new THREE.Vector3(bd / 2, bh / 2, rd / 2));
        addBoard(new THREE.BoxGeometry(bd, bh, rd), new THREE.Vector3(rw - bd / 2, bh / 2, rd / 2));
        var ch = 0.05, cd = 0.04, cornMat = new THREE.MeshBasicMaterial({ color: _p.trimColor ? srgbHexToLinear(_p.trimColor) : new THREE.Color(0xe8e4de).convertSRGBToLinear() });
        function addCornice(geo, pos) { var m = new THREE.Mesh(geo, cornMat.clone()); m.position.copy(pos); roomGroup.add(m); }
        addCornice(new THREE.BoxGeometry(rw, ch, cd), new THREE.Vector3(rw / 2, WH - ch / 2, cd / 2));
        addCornice(new THREE.BoxGeometry(rw, ch, cd), new THREE.Vector3(rw / 2, WH - ch / 2, rd - cd / 2));
        addCornice(new THREE.BoxGeometry(cd, ch, rd), new THREE.Vector3(cd / 2, WH - ch / 2, rd / 2));
        addCornice(new THREE.BoxGeometry(cd, ch, rd), new THREE.Vector3(rw - cd / 2, WH - ch / 2, rd / 2));
        var lf = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.05, 20), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        lf.position.set(rw / 2, WH - 0.025, rd / 2); roomGroup.add(lf);
        var pl = new THREE.PointLight(0xffe8c0, 0.7, rw * 2.5, 1.8); pl.position.set(rw / 2, WH - 0.15, rd / 2); roomGroup.add(pl);
        sun.shadow.camera.left = -(rw + 3); sun.shadow.camera.right = rw + 3; sun.shadow.camera.top = rd + 3; sun.shadow.camera.bottom = -(rd + 3); sun.shadow.camera.updateProjectionMatrix();
        var roomMax = Math.max(rw, rd);
        controls.target.set(rw / 2, WH * 0.35, rd / 2);
        camera.position.set(rw / 2 + roomMax * 0.85, roomMax * 0.6, rd / 2 + roomMax * 0.95);
        controls.update();
      }

      // ── Render loop ──────────────────────────────────────────────────────
      (function loop() { requestAnimationFrame(loop); handleKeys(); controls.update(); if (selectionBox) selectionBox.update(); renderer.render(scene, camera); })();

      // ── Model definitions ────────────────────────────────────────────────
      var MODEL_DEFS = [
        ['chair', 'chair.glb', 0.90], ['sofa', 'sofa.glb', 0.85], ['armchair', 'arm_chair.glb', 0.88],
        ['bench', 'bench.glb', 0.50], ['stool', 'stool.glb', 0.65], ['table', 'table.glb', 0.75],
        ['coffeeTable', 'coffee_table.glb', 0.45], ['desk', 'desk.glb', 0.75], ['sideTable', 'side_table.glb', 0.60],
        ['wardrobe', 'wardrobe.glb', 1.90], ['bookshelf', 'book_shelf.glb', 1.80], ['cabinet', 'cabinet.glb', 0.85],
        ['dresser', 'dresser.glb', 1.10], ['bed', 'double_bed.glb', 0.55], ['singleBed', 'single_bed.glb', 0.55],
        ['nightstand', 'night_stand.glb', 0.60], ['plant', 'plant.glb', 1.20], ['lamp', 'floor_lamp.glb', 1.65],
        ['tvStand', 'tv_stand.glb', 0.50], ['rug', 'rug.glb', 0.02],
      ];
      var MODEL_FILE = {}, MODEL_HEIGHT = {};
      MODEL_DEFS.forEach(function (d) { MODEL_FILE[d[0]] = d[1]; MODEL_HEIGHT[d[0]] = d[2]; });

      var TIMEOUT_MS = 8000;
      var customGlbFiles = {};

      function getNeededTypes() {
        var payload = getPayload(); if (!payload || !payload.items) return [];
        var seen = {};
        payload.items.forEach(function (item) { if (item.glbFile) { customGlbFiles[item.glbFile] = true; } else if (MODEL_FILE[item.type]) { seen[item.type] = true; } });
        return Object.keys(seen);
      }

      function loadOneModel(dartName, index, total, onDone) {
        var filename = MODEL_FILE[dartName], pct = 40 + Math.round((index / total) * 50);
        setStatus('Loading ' + dartName + '… (' + (index + 1) + '/' + total + ')', pct);
        var done = false;
        var timer = setTimeout(function () { if (done) return; done = true; console.warn(dartName + ' timed out'); onDone(); }, TIMEOUT_MS);
        var loader = new THREE.GLTFLoader();
        loader.load(filename,
          function (gltf) { if (done) return; done = true; clearTimeout(timer); bank[dartName] = gltf.scene; onDone(); }, null,
          function (err) { if (done) return; done = true; clearTimeout(timer); console.warn('Failed ' + dartName, err); onDone(); }
        );
      }

      function loadSeq(types, i, onAllDone) {
        if (i >= types.length) { onAllDone(); return; }
        loadOneModel(types[i], i, types.length, function () { loadSeq(types, i + 1, onAllDone); });
      }

      function onReady() {
        setStatus('Building scene…', 95);
        var payload = getPayload();
        if (!payload || !payload.items) { buildRoom(10, 10); hideLoading(); return; }
        var TARGET_M = 12, rs = TARGET_M / Math.max(payload.roomWidth, payload.roomDepth);
        buildRoom(payload.roomWidth * rs, payload.roomDepth * rs);
        var fg = new THREE.Group(); scene.add(fg);
        placedItems = [];
        payload.items.forEach(function (item, idx) {
          var result = placeItem(item, rs);
          fg.add(result.obj);
          placedItems.push({ obj: result.obj, data: item, baseScale: result.baseScale, scaleFactor: item.scaleFactor || 1.0, index: idx });
        });

        // ── Raycasting setup ────────────────────────────────────────────────
        // Use pointerdown/pointerup instead of mousedown/click.
        // This bypasses the OrbitControls event interception that was
        // preventing click events from reaching the raycaster.
        var raycaster = new THREE.Raycaster();
        var _mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', function (e) {
          mouseDownX = e.clientX;
          mouseDownY = e.clientY;
        });

        renderer.domElement.addEventListener('pointerup', function (e) {
          if (!selectMode) return;
          if (e.button !== 0) return;   // left button only

          // If pointer moved more than 6 px it was a drag, not a tap
          var dx = e.clientX - mouseDownX, dy = e.clientY - mouseDownY;
          if (Math.sqrt(dx * dx + dy * dy) > 6) return;

          var rect = renderer.domElement.getBoundingClientRect();
          _mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          _mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
          raycaster.setFromCamera(_mouse, camera);

          var targets = placedItems.map(function (pi) { return pi.obj; });
          var hits = raycaster.intersectObjects(targets, true);
          if (hits.length > 0) {
            var hitMesh = hits[0].object;
            for (var i = 0; i < placedItems.length; i++) {
              var found = false;
              placedItems[i].obj.traverse(function (c) { if (c === hitMesh) found = true; });
              if (found) { selectFurniture(placedItems[i]); return; }
            }
          }
          deselectFurniture();
        });

        console.log('Scene ready — ' + payload.items.length + ' items placed');
        setStatus('Done!', 100);
        hideLoading();
      }

      // ── Place a single item ──────────────────────────────────────────────
      function placeItem(item, rs) {
        var tw = item.width * rs, td = item.height * rs;
        var cx = (item.x + item.width / 2) * rs, cz = (item.y + item.height / 2) * rs;
        var obj, baseScale = 1.0;
        var tmpl = item.glbFile ? bank[item.glbFile] : bank[item.type];
        if (tmpl) {
          obj = tmpl.clone();
          obj.traverse(function (c) { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
          obj.scale.set(1, 1, 1); obj.position.set(0, 0, 0); obj.rotation.set(0, 0, 0); obj.updateMatrixWorld(true);
          var bbox = new THREE.Box3().setFromObject(obj), sz = bbox.getSize(new THREE.Vector3());
          var th = MODEL_HEIGHT[item.type] || 0.85;
          var sX = sz.x > 0.001 ? tw / sz.x : 1, sZ = sz.z > 0.001 ? td / sz.z : 1, sY = sz.y > 0.001 ? th / sz.y : 1;
          var s = Math.min(sX, sZ, sY), sf = item.scaleFactor || 1.0;
          baseScale = s; obj.scale.setScalar(s * sf);
          var bbox2 = new THREE.Box3().setFromObject(obj); obj.position.y = -bbox2.min.y;
        } else {
          var h = (MODEL_HEIGHT[item.type] || 0.80) * (item.scaleFactor || 1.0);
          obj = new THREE.Mesh(new THREE.BoxGeometry(tw, h, td), new THREE.MeshLambertMaterial({ color: 0x888888 }));
          obj.position.y = h / 2; obj.castShadow = true; obj.receiveShadow = true; baseScale = 1.0;
        }
        obj.position.x = cx; obj.position.z = cz; obj.rotation.y = -(item.rotation || 0);
        return { obj: obj, baseScale: baseScale };
      }

      // ── Resize ───────────────────────────────────────────────────────────
      window.addEventListener('resize', function () {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ── Start loading ────────────────────────────────────────────────────
      var neededTypes = getNeededTypes(), customFiles = Object.keys(customGlbFiles);
      function loadCustomGlbs(i, onDone) {
        if (i >= customFiles.length) { onDone(); return; }
        var filename = customFiles[i];
        setStatus('Loading custom model ' + (i + 1) + '/' + customFiles.length, 40 + Math.round((i / customFiles.length) * 20));
        var done = false;
        var timer = setTimeout(function () { if (done) return; done = true; loadCustomGlbs(i + 1, onDone); }, 8000);
        var loader = new THREE.GLTFLoader();
        loader.load(filename,
          function (gltf) { if (done) return; done = true; clearTimeout(timer); bank[filename] = gltf.scene; loadCustomGlbs(i + 1, onDone); }, null,
          function (err) { if (done) return; done = true; clearTimeout(timer); console.warn('Failed custom GLB:' + filename, err); loadCustomGlbs(i + 1, onDone); }
        );
      }
      if (neededTypes.length === 0 && customFiles.length === 0) { buildRoom(10, 10); hideLoading(); }
      else { setStatus('Preparing models…', 40); loadCustomGlbs(0, function () { loadSeq(neededTypes, 0, onReady); }); }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Select Mode
    // ─────────────────────────────────────────────────────────────────────────

    function toggleSelectMode() {
      selectMode = !selectMode;
      var toggle = document.getElementById('select-toggle');
      var label = document.getElementById('select-toggle-label');
      if (selectMode) {
        toggle.classList.add('active');
        label.textContent = 'Select Mode ON';
        document.body.classList.add('select-active');
        // ── KEY FIX: disable left-button orbit so clicks reach the raycaster
        if (_controls) {
          _controls.mouseButtons = { LEFT: -1, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
        }
      } else {
        toggle.classList.remove('active');
        label.textContent = 'Select & Resize';
        document.body.classList.remove('select-active');
        deselectFurniture();
        // Restore normal orbit
        if (_controls) {
          _controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
        }
      }
    }

    function selectFurniture(entry) {
      if (selectionBox && _scene) _scene.remove(selectionBox);
      selectedEntry = entry;
      if (typeof THREE !== 'undefined' && _scene) {
        selectionBox = new THREE.BoxHelper(entry.obj, 0x6366f1);
        _scene.add(selectionBox);
      }
      var name = (entry.data.label || entry.data.type || 'Furniture');
      name = name.replace(/([A-Z])/g, ' $1').trim();
      name = name.charAt(0).toUpperCase() + name.slice(1);
      document.getElementById('panel-furniture-name').textContent = name;
      var slider = document.getElementById('scale-slider');
      slider.value = Math.log(Math.max(0.01, entry.scaleFactor));
      updateSliderTrack(slider);
      document.getElementById('scale-value-badge').textContent = entry.scaleFactor.toFixed(2) + '×';
      updatePresets(entry.scaleFactor);
      document.getElementById('size-panel').classList.add('visible');
    }

    function deselectFurniture() {
      if (selectionBox && _scene) _scene.remove(selectionBox);
      selectionBox = null; selectedEntry = null;
      document.getElementById('size-panel').classList.remove('visible');
    }

    function applyScale(factor) {
      if (!selectedEntry) return;
      factor = Math.max(0.01, Math.min(20, factor));
      selectedEntry.scaleFactor = factor;
      selectedEntry.obj.scale.setScalar(selectedEntry.baseScale * factor);
      if (typeof THREE !== 'undefined') {
        selectedEntry.obj.position.y = 0;
        var bbox = new THREE.Box3().setFromObject(selectedEntry.obj);
        selectedEntry.obj.position.y = -bbox.min.y;
        if (selectionBox) selectionBox.update();
      }
      var slider = document.getElementById('scale-slider');
      // Slider position is ln(factor) to give logarithmic distribution
      slider.value = Math.log(factor);
      updateSliderTrack(slider);
      document.getElementById('scale-value-badge').textContent = factor.toFixed(2) + '×';
      updatePresets(factor);
    }

    function applyPreset(val) { applyScale(val); }
    function resetScale() { applyScale(1.0); }

    function saveSize() {
      if (!selectedEntry) return;
      var msg = { type: 'sizeUpdate', id: selectedEntry.data.id, index: selectedEntry.index, scaleFactor: selectedEntry.scaleFactor };
      try { window.chrome.webview.postMessage(JSON.stringify(msg)); } catch (e) { console.log('[3D] postMessage not available:', e); }
      var btn = document.getElementById('btn-save');
      btn.textContent = '✓ Saved!'; btn.classList.add('saved');
      setTimeout(function () { btn.textContent = '💾 Save Size'; btn.classList.remove('saved'); }, 1800);
    }

    function updateSliderTrack(slider) {
      var min = parseFloat(slider.min), max = parseFloat(slider.max), val = parseFloat(slider.value);
      slider.style.setProperty('--pct', ((val - min) / (max - min) * 100).toFixed(1) + '%');
    }

    function updatePresets(factor) {
      var presets = [0.1, 0.5, 1.0, 3.0, 5.0, 10.0, 20.0];
      document.querySelectorAll('.preset-btn').forEach(function (btn, i) {
        btn.classList.toggle('active', Math.abs(presets[i] - factor) < 0.02);
      });
    }

    // ── Wire UI events ─────────────────────────────────────────────────────
    (function wireUI() {
      ['mousedown', 'pointerdown'].forEach(function (ev) {
        document.getElementById('select-toggle').addEventListener(ev, function (e) { e.stopPropagation(); });
        document.getElementById('panel-close').addEventListener(ev, function (e) { e.stopPropagation(); });
        document.getElementById('scale-slider').addEventListener(ev, function (e) { e.stopPropagation(); });
        document.getElementById('btn-reset').addEventListener(ev, function (e) { e.stopPropagation(); });
        document.getElementById('btn-save').addEventListener(ev, function (e) { e.stopPropagation(); });
        document.getElementById('size-panel').addEventListener(ev, function (e) { e.stopPropagation(); });
      });

      document.getElementById('select-toggle').addEventListener('click', function (e) { e.stopPropagation(); toggleSelectMode(); });
      document.getElementById('panel-close').addEventListener('click', function (e) { e.stopPropagation(); deselectFurniture(); });
      document.getElementById('scale-slider').addEventListener('input', function () {
        // Slider stores ln(scale), so exp() gives the real scale factor
        applyScale(Math.exp(parseFloat(this.value)));
      });
      document.getElementById('scale-slider').addEventListener('click', function (e) { e.stopPropagation(); });

      document.querySelectorAll('.preset-btn').forEach(function (btn) {
        btn.addEventListener('mousedown', function (e) { e.stopPropagation(); });
        btn.addEventListener('click', function (e) { e.stopPropagation(); applyPreset(parseFloat(this.dataset.preset)); });
      });

      document.getElementById('btn-reset').addEventListener('click', function (e) { e.stopPropagation(); resetScale(); });
      document.getElementById('btn-save').addEventListener('click', function (e) { e.stopPropagation(); saveSize(); });
      document.getElementById('size-panel').addEventListener('click', function (e) { e.stopPropagation(); });
    })();
  </script>
</body>

</html>
